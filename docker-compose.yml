services:
  jekyll:
    image: jekyll/jekyll:latest
    # command: jekyll clean
    command: bash -lc "bundle install && bundle exec jekyll serve --watch --host 0.0.0.0"
    # command: bundle exec jekyll serve --watch --incremental --host 0.0.0.0
    ports:
      - 4000:4000
    volumes:
      - .:/srv/jekyll
